# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: build and release
on:
  push:
    tags:
      - "release-v*"

env:
  FLUTTER_VERSION: 3.32.4
  LINUX_DEPENDENCIES: git wget unzip python3 zip xz-utils curl clang cmake ninja-build pkg-config libgtk-3-dev libblkid-dev liblzma-dev libjsoncpp-dev cmake-data libjsoncpp25 libsecret-1-dev libsecret-1-0 librhash0 libsqlite3-dev libappindicator3-dev gettext libwebkit2gtk-4.1-dev

jobs:

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Install project dependencies
        run: |
          ./script/fetch_git_info.ps1
          flutter pub get
          flutter pub run build_runner build
          dart run script/add_builtin.dart > lib/builtin/maccms/maccms.dart
      - name: Build windows
        run: |
          flutter config --enable-windows-desktop
          flutter build windows --release -v
      - name: Add Microsoft vc redistributable .dll
        run: |
          $dest = "build\windows\x64\runner\Release\"
          $system = "C:\Windows\System32"
          cp $system/msvcp140.dll $dest
          cp $system/vcruntime140.dll $dest
          cp $system/vcruntime140_1.dll $dest
      - name: Archive Release
        uses: thedoctor0/zip-release@master
        with:
          type: 'zip'
          filename: catmovie-windows.zip
          directory: build/windows/x64/runner/Release
      - name: Upload assets
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/windows/x64/runner/Release/catmovie-windows.zip

  build-linux:
    runs-on: ubuntu-22.04

    env:
      TARBALL_NAME: catmovie-linux-x86_64.tar.gz

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - name: Disable Google Analytics
        run: flutter config --no-analytics
      - name: Install dependencies
        run: |
          flutter pub get
          flutter pub run build_runner build
      - name: Enable Linux support
        run: flutter config --enable-linux-desktop
      - name: Install dependencies
        run: sudo apt update && sudo apt-get install -y ${{ env.LINUX_DEPENDENCIES }} || true
      - name: Build
        run: |
          python3 script/linux_apply_font.py
          bash script/fetch_git_info.sh
          dart run script/add_builtin.dart > lib/builtin/maccms/maccms.dart
          flutter build linux --release -v
      - name: Create tarball
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../${{ env.TARBALL_NAME }} *
      - name: Upload assets
        uses: actions/upload-artifact@v4
        with:
          name: x86_64_linux
          path: build/linux/x64/release/${{ env.TARBALL_NAME }}

  build-and-release:
    runs-on: macos-latest
    steps:
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
          channel: "stable"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate release notes
        run: node script/draft-release-notes.js > release-notes.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build android apk
        # flutter build apk --target-platform android-arm,android-arm64,android-x64 --split-per-abi
        run: |
          bash script/fetch_git_info.sh
          flutter pub get
          flutter pub run build_runner build
          dart run script/add_builtin.dart > lib/builtin/maccms/maccms.dart
          flutter build apk --release -v
          cp build/app/outputs/flutter-apk/app-release.apk catmovie.apk

      - name: Build iOS ipa
        run: |
          flutter build ios --release --no-codesign -v
          cd build/ios/iphoneos
          mkdir Payload
          cd Payload
          ln -s ../Runner.app
          cd ..
          zip -r catmovie.ipa Payload

      - name: Build macOS
        run: |
          flutter config --enable-macos-desktop
          flutter build macos --release -v
          cd build/macos/Build/Products/Release
          zip -r catmovie-mac.zip 小猫影视.app/*

      - uses: actions/download-artifact@v4
        with:
          name: windows
      - uses: actions/download-artifact@v4
        with:
          name: x86_64_linux

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.txt
          prerelease: false
          files: |
            catmovie-windows.zip
            catmovie-linux-x86_64.tar.gz
            catmovie.apk
            build/ios/iphoneos/catmovie.ipa
            build/macos/Build/Products/Release/catmovie-mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
